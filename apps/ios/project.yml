name: RateRadar
options:
  bundleIdPrefix: com.lawoflarge
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads
    from: 12.0.0
  GoogleUserMessagingPlatform:
    url: https://github.com/googleads/swift-package-manager-google-user-messaging-platform
    from: 2.1.0

settings:
  base:
    MARKETING_VERSION: "1.1.0"
    CURRENT_PROJECT_VERSION: "7"
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: "R95M36AU2X"
    SWIFT_STRICT_CONCURRENCY: targeted
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  RateRadar:
    type: application
    platform: iOS
    sources:
      - path: RateRadar
    dependencies:
      - package: GoogleMobileAds
        product: GoogleMobileAds
      - package: GoogleUserMessagingPlatform
        product: GoogleUserMessagingPlatform
    info:
      path: RateRadar/Resources/Info.plist
    entitlements:
      path: RateRadar/RateRadar.entitlements
      properties:
        aps-environment: development
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lawoflarge.rateradar
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_EMIT_LOC_STRINGS: YES

  RateRadarTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: RateRadar

schemes:
  RateRadar:
    build:
      targets:
        RateRadar: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - RateRadarTests
    archive:
      config: Release
