name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    name: Web (lint + typecheck + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test

  pipeline:
    name: Data pipeline (lint + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/data-pipeline
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: services/data-pipeline/requirements.txt
      - run: pip install -r requirements.txt
      - run: black --check src tests
      - run: ruff check src tests
      - run: mypy src
      - run: pytest --cov=src --cov-report=term-missing

  # iOS build runs only when Xcode project is present — skipped until apps/ios is scaffolded.
  # Uncomment and tune once `apps/ios/RateRadar.xcodeproj` exists.
