name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    name: Web (lint + typecheck + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # pnpm version is pinned via `packageManager` in root package.json;
      # action-setup picks it up automatically. Do not also pass `version:`.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Lint web
        working-directory: apps/web
        run: pnpm lint
      - name: Build web (includes typecheck)
        working-directory: apps/web
        env:
          # Build must work without Supabase env vars — the data layer falls
          # back to mock data so CI can run without secrets.
          NEXT_TELEMETRY_DISABLED: "1"
        run: pnpm build

  pipeline:
    name: Data pipeline (lint + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/data-pipeline
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: services/data-pipeline/requirements.txt
      - run: pip install -r requirements.txt
      - name: Format check (black)
        # Non-blocking for now — tracked for cleanup; pytest is the hard gate.
        run: black --check src tests || true
      - name: Lint (ruff)
        run: ruff check src tests || true
      - name: Type check (mypy)
        run: mypy src || true
      - run: pytest

  # iOS build runs only when Xcode project is present — skipped until apps/ios is scaffolded.
  # Uncomment and tune once `apps/ios/RateRadar.xcodeproj` exists.
