name: Pipeline cron

# Runs the data pipeline twice per business day and every 15 min on FOMC/ECB
# meeting days. The meeting-day refresh trigger is manual for now — automate
# via an external scheduler or by extending this workflow with an event filter
# once calendars are integrated.
#
# Required repo secrets:
#   RR_DB_URL  Supabase Postgres connection string with password.

on:
  schedule:
    # 22:00 UTC — after US close
    - cron: "0 22 * * 1-5"
    # 18:00 UTC — after European close
    - cron: "0 18 * * 1-5"
  workflow_dispatch:
    inputs:
      bank:
        description: "Bank to run"
        type: choice
        options: [fed, ecb]
        default: fed

jobs:
  run:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        bank: [fed, ecb]
    defaults:
      run:
        working-directory: services/data-pipeline
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/data-pipeline/requirements.txt
      - run: pip install -r requirements.txt
      - name: Run ${{ matrix.bank }} pipeline with write
        env:
          RR_DB_URL: ${{ secrets.RR_DB_URL }}
        run: python -m src.main --bank ${{ matrix.bank }} --source mock --write
